basePath: /api/v1
definitions:
  dto.ErrorDetail:
    properties:
      code:
        example: INVALID_INPUT
        type: string
      details: {}
      message:
        example: Validation failed
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dto.ErrorDetail'
      status:
        example: error
        type: string
    type: object
  dto.MetaData:
    properties:
      current_page:
        example: 1
        type: integer
      limit:
        example: 5
        type: integer
      total_pages:
        example: 20
        type: integer
      total_records:
        example: 100
        type: integer
    type: object
  dto.PaginatedResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/dto.MetaData'
      status:
        example: success
        type: string
    type: object
  dto.SuccessResponse:
    properties:
      data: {}
      status:
        example: success
        type: string
    type: object
  models.Item:
    properties:
      available_stock:
        type: integer
      category:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        minLength: 3
        type: string
      physical_stock:
        type: integer
      price:
        minimum: 1
        type: number
      sku:
        type: string
      updated_at:
        type: string
    required:
    - category
    - name
    - sku
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: Premium Core System for Warehouse and Inventory Management.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Smart Inventory API
  version: "1.0"
paths:
  /items:
    get:
      consumes:
      - application/json
      description: Get a list of all inventory items with optional filtering and pagination.
      parameters:
      - description: Item filter (name, sku, category)
        in: query
        name: filter
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List all items
      tags:
      - items
    post:
      consumes:
      - application/json
      description: Add a new SKU to the inventory assets.
      parameters:
      - description: Item Object
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/models.Item'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create new item
      tags:
      - items
  /items/{id}:
    delete:
      consumes:
      - application/json
      description: Permantently remove an inventory item asset.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete item
      tags:
      - items
    get:
      consumes:
      - application/json
      description: Retrieve details of a single inventory item by its numeric ID.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get item by ID
      tags:
      - items
    put:
      consumes:
      - application/json
      description: Modify an existing inventory item's details.
      parameters:
      - description: Item ID
        in: path
        name: id
        required: true
        type: integer
      - description: Item Object
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/models.Item'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update item
      tags:
      - items
  /transactions:
    get:
      consumes:
      - application/json
      description: Retrieve a filtered list of all stock movements (IN/OUT) and their
        statuses.
      parameters:
      - description: Transaction type (STOCK_IN, STOCK_OUT)
        in: query
        name: type
        type: string
      - description: Transaction status (CREATED, DRAFT, IN_PROGRESS, DONE, CANCELLED)
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List transactions
      tags:
      - transactions
  /transactions/{id}/status:
    put:
      consumes:
      - application/json
      description: Change the status of an existing transaction (e.g., from DRAFT
        to DONE). Triggers inventory balancing.
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status Update Request (status, notes)
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update transaction status
      tags:
      - transactions
  /transactions/stock-in:
    post:
      consumes:
      - application/json
      description: Create a new incoming stock transaction. This increases available
        and physical stock upon completion.
      parameters:
      - description: Stock In Request (item_id, quantity, reference_id, notes)
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create Stock In
      tags:
      - transactions
  /transactions/stock-out:
    post:
      consumes:
      - application/json
      description: Create a new outgoing stock transaction. This reserves available
        stock immediately.
      parameters:
      - description: Stock Out Request (item_id, quantity, reference_id, notes)
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create Stock Out
      tags:
      - transactions
swagger: "2.0"
